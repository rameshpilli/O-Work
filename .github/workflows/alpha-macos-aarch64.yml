name: Alpha Channel (macOS arm64)

# Every merge to `dev` publishes a fresh macOS arm64 build to the OpenWork
# alpha release channel. The rolling release carries both desktop shells during
# the Tauri -> Electron migration window:
#   - Tauri updater assets + latest.json
#   - Electron updater assets + latest-mac.yml

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alpha-macos-aarch64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-alpha-macos-aarch64:
    name: Build + Publish alpha (aarch64-apple-darwin)
    runs-on: macos-14
    timeout-minutes: 240

    env:
      OPENCODE_GITHUB_REPO: ${{ vars.OPENCODE_GITHUB_REPO || 'anomalyco/opencode' }}
      ALPHA_RELEASE_TAG: alpha-macos-latest
      ALPHA_RELEASE_NAME: OpenWork Alpha (macOS arm64)
      MACOS_NOTARIZE: ${{ vars.MACOS_NOTARIZE || 'true' }}
      TAURI_ENV_TARGET_TRIPLE: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.6"

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: macos-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            macos-pnpm-

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: macos-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Require notarized alpha builds
        if: env.MACOS_NOTARIZE != 'true'
        run: |
          echo "Alpha releases must be signed and notarized. Set MACOS_NOTARIZE=true." >&2
          exit 1

      - name: Resolve alpha version
        id: alpha-version
        shell: bash
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = "apps/desktop/src-tauri/tauri.conf.json";
          const raw = JSON.parse(fs.readFileSync(path, "utf8"));
          const current = String(raw.version || "").trim();
          const match = current.match(/^(\d+)\.(\d+)\.(\d+)(?:-.+)?$/);
          if (!match) {
            throw new Error(`Unsupported version in ${path}: ${current}`);
          }
          const [, major, minor, patch] = match;
          const nextPatch = Number(patch) + 1;
          const run = process.env.GITHUB_RUN_NUMBER || "0";
          const sha = (process.env.GITHUB_SHA || "").slice(0, 7) || "local";
          const alpha = `${major}.${minor}.${nextPatch}-alpha.${run}+${sha}`;
          console.log(`alpha_version=${alpha}`);
          console.log(`base_version=${major}.${minor}.${nextPatch}`);
          NODE

      - name: Write alpha Tauri config override
        shell: bash
        env:
          ALPHA_VERSION: ${{ steps.alpha-version.outputs.alpha_version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const base = "apps/desktop/src-tauri/tauri.conf.json";
          const out = "apps/desktop/src-tauri/tauri.conf.alpha.json";
          const config = JSON.parse(fs.readFileSync(base, "utf8"));

          config.version = process.env.ALPHA_VERSION;
          config.bundle = { ...(config.bundle || {}), createUpdaterArtifacts: true };
          config.plugins = config.plugins || {};
          config.plugins.updater = {
            ...(config.plugins.updater || {}),
            endpoints: [
              "https://github.com/different-ai/openwork/releases/download/alpha-macos-latest/latest.json",
            ],
          };

          fs.writeFileSync(out, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Write alpha Electron package version
        shell: bash
        env:
          ALPHA_VERSION: ${{ steps.alpha-version.outputs.alpha_version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const path = "apps/desktop/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.version = process.env.ALPHA_VERSION;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Write notary API key
        env:
          APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_NOTARY_API_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          echo "NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Normalize Electron signing identity
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          CSC_NAME_VALUE="${APPLE_SIGNING_IDENTITY#Developer ID Application: }"
          echo "CSC_NAME=$CSC_NAME_VALUE" >> "$GITHUB_ENV"

      - name: Build + package alpha Electron app
        env:
          CSC_LINK: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
          CSC_NAME: ${{ env.CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          APPLE_API_KEY_PATH: ${{ env.NOTARY_KEY_PATH }}
          MACOS_NOTARIZE: "true"
        run: |
          set -euo pipefail
          pnpm --filter @openwork/desktop package:electron -- --mac --arm64 --publish never

      - name: Verify alpha Electron notarization
        run: |
          set -euo pipefail

          APP_PATH="$(python3 - <<'PY'
          from pathlib import Path
          matches = sorted(Path('apps/desktop/dist-electron').glob('mac*/OpenWork.app'))
          if not matches:
              raise SystemExit('OpenWork.app not found in apps/desktop/dist-electron/mac*')
          print(matches[0])
          PY
          )"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Clear previous alpha release (rolling channel)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete "$ALPHA_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --cleanup-tag \
            --yes || true

      - name: Build + upload alpha Tauri app
        uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          APPLE_API_KEY_PATH: ${{ env.NOTARY_KEY_PATH }}
        with:
          tagName: ${{ env.ALPHA_RELEASE_TAG }}
          releaseName: ${{ env.ALPHA_RELEASE_NAME }}
          releaseBody: |
            Rolling alpha build for OpenWork (macOS arm64).
            Every merge to `dev` replaces the artifacts attached to this release.
            This release carries both notarized Tauri and notarized Electron artifacts.
          releaseDraft: false
          prerelease: true
          projectPath: apps/desktop
          tauriScript: pnpm exec tauri -vvv
          args: --config src-tauri/tauri.conf.alpha.json --target aarch64-apple-darwin --bundles dmg,app
          retryAttempts: 3
          uploadUpdaterJson: false
          releaseAssetNamePattern: openwork-desktop-[platform]-[arch][ext]

      - name: Verify alpha Tauri notarization
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tmp_dir="$RUNNER_TEMP/openwork-alpha-tauri-verify"
          rm -rf "$tmp_dir"
          mkdir -p "$tmp_dir"

          gh release download "$ALPHA_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "openwork-desktop-darwin-aarch64.app.tar.gz" \
            --dir "$tmp_dir"

          tar -xzf "$tmp_dir/openwork-desktop-darwin-aarch64.app.tar.gz" -C "$tmp_dir"
          app_path="$tmp_dir/OpenWork.app"

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

      - name: Generate alpha latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          ALPHA_VERSION: ${{ steps.alpha-version.outputs.alpha_version }}
        run: |
          set -euo pipefail
          node scripts/release/generate-latest-json.mjs \
            --tag "$ALPHA_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --version "$ALPHA_VERSION" \
            --output "$RUNNER_TEMP/alpha-latest.json"

      - name: Upload alpha latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$ALPHA_RELEASE_TAG" \
            "$RUNNER_TEMP/alpha-latest.json#latest.json" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload Electron alpha assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ASSET_LIST="$RUNNER_TEMP/electron-alpha-assets.txt"
          python3 - <<'PY' > "$ASSET_LIST"
          from pathlib import Path
          root = Path('apps/desktop/dist-electron')
          suffixes = ('.dmg', '.zip', '.blockmap', '.yml')
          files = sorted(path for path in root.iterdir() if path.is_file() and path.suffix in suffixes)
          if not files:
              raise SystemExit('No Electron alpha assets found in apps/desktop/dist-electron')
          for path in files:
              print(path)
          PY

          mapfile -t files < "$ASSET_LIST"
          gh release upload "$ALPHA_RELEASE_TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
