name: Pilot Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to create or update (example: pilot-2026-05-26)"
        required: true
        type: string
      release_name:
        description: "Release title (defaults to Pilot Desktop <tag>)"
        required: false
        type: string
      release_body:
        description: "Optional Markdown release notes"
        required: false
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_body: ${{ steps.meta.outputs.release_body }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.release_tag }}"
          NAME="${{ github.event.inputs.release_name }}"
          BODY="${{ github.event.inputs.release_body }}"
          DRAFT="${{ github.event.inputs.draft }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"

          if [ -z "$NAME" ]; then
            NAME="Pilot Desktop $TAG"
          fi
          if [ -z "$BODY" ]; then
            printf -v BODY '%s\n\n%s\n%s\n%s' \
              "Pilot desktop release built from branch ${GITHUB_REF_NAME}." \
              "- Download the attached macOS .dmg or Windows .exe installer." \
              "- Connect the remote worker later from the OpenWork UI with your assigned URL/token." \
              "- Review the Windows smoke screenshots artifact in the linked workflow run."
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<__OPENWORK_PILOT_RELEASE_BODY__"
            printf '%s\n' "$BODY"
            echo "__OPENWORK_PILOT_RELEASE_BODY__"
          } >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"
          BODY_FILE="$RUNNER_TEMP/pilot_release_body.md"
          printf '%s\n' "${{ steps.meta.outputs.release_body }}" > "$BODY_FILE"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it in place."
            exit 0
          fi

          DRAFT_FLAG=""
          PRERELEASE_FLAG=""
          if [ "${{ steps.meta.outputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.meta.outputs.release_name }}" \
            --notes-file "$BODY_FILE" \
            $DRAFT_FLAG $PRERELEASE_FLAG

  build-and-publish:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos
            node_version_file: .nvmrc
          - os: windows-latest
            artifact_name: windows
            node_version: 22
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node (macOS)
        uses: actions/setup-node@v6
        if: runner.os == 'macOS'
        with:
          node-version-file: ${{ matrix.node_version_file }}

      - name: Setup Node (Windows)
        uses: actions/setup-node@v6
        if: runner.os == 'Windows'
        with:
          node-version: ${{ matrix.node_version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm --filter @openwork/desktop build:electron

      - name: Capture Windows UI smoke screenshots
        if: runner.os == 'Windows'
        env:
          OPENWORK_TEST_WORKER_URL: ${{ secrets.OPENWORK_TEST_WORKER_URL }}
          OPENWORK_TEST_WORKER_TOKEN: ${{ secrets.OPENWORK_TEST_WORKER_TOKEN }}
          OPENWORK_TEST_WORKER_NAME: ${{ secrets.OPENWORK_TEST_WORKER_NAME }}
          OPENWORK_TEST_PROMPT: ${{ secrets.OPENWORK_TEST_PROMPT }}
          OPENWORK_TEST_EXPECT_TEXT: ${{ secrets.OPENWORK_TEST_EXPECT_TEXT }}
        run: pnpm --filter @openwork/desktop smoke:screenshot -- --outdir dist-electron/smoke-artifacts

      - name: Upload Windows smoke artifacts
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pilot-windows-smoke-artifacts
          path: apps/desktop/dist-electron/smoke-artifacts/**

      - name: Build installer
        run: pnpm --dir apps/desktop exec electron-builder --config electron-builder.yml --publish never

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-desktop-${{ matrix.artifact_name }}
          path: apps/desktop/dist-electron/**

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(apps/desktop/dist-electron/openwork-*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found in apps/desktop/dist-electron" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
