name: Desktop Installers

on:
  workflow_dispatch:
  push:
    branches:
      - feature/windows
    paths:
      - apps/app/**
      - apps/desktop/**
      - packages/ui/**
      - packages/openwork-ui-mcp/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/desktop-installers.yml

jobs:
  package-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos-installer
            node_version_file: .nvmrc
          - os: windows-latest
            artifact: windows-installer
            node_version: 22
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node (macOS)
        uses: actions/setup-node@v6
        if: runner.os == 'macOS'
        with:
          node-version-file: ${{ matrix.node_version_file }}

      - name: Setup Node (Windows)
        uses: actions/setup-node@v6
        if: runner.os == 'Windows'
        with:
          node-version: ${{ matrix.node_version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm --filter @openwork/desktop build:electron

      - name: Capture Windows UI smoke screenshots
        if: runner.os == 'Windows'
        run: pnpm --filter @openwork/desktop smoke:screenshot -- --outdir dist-electron/smoke-artifacts

      - name: Build installer
        run: pnpm --dir apps/desktop exec electron-builder --config electron-builder.yml --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwork-${{ matrix.artifact }}
          path: apps/desktop/dist-electron/**
