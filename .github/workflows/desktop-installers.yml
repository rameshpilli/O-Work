name: Desktop Installers

on:
  workflow_dispatch:
  push:
    branches:
      - feature/windows
    paths:
      - apps/app/**
      - apps/desktop/**
      - packages/ui/**
      - packages/openwork-ui-mcp/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/desktop-installers.yml

jobs:
  package-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos-installer
          - os: windows-latest
            artifact: windows-installer
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm --filter @openwork/desktop package:electron

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwork-${{ matrix.artifact }}
          path: apps/desktop/dist-electron/**
